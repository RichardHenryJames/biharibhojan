# Local SQL Server for development — mirrors Azure SQL Database.
# Usage:
#   npm run db:up      # start
#   npm run setup      # generate client, push schema, seed
#   npm run db:down    # stop

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: biharibhojan-db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Bihari_Dev_Pw1" # local dev only — not a production secret
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - bihari_mssqldata:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  bihari_mssqldata:
